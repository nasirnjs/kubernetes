# IMPORTANT: Do NOT commit real values. Create with literals instead:
#
#   kubectl -n ecommerce create secret generic product-service-secret \
#     --from-literal=DB_HOST=<postgres-host> \
#     --from-literal=DB_USER=<db-user> \
#     --from-literal=DB_PASSWORD=<db-password>
apiVersion: v1
kind: Secret
metadata:
  name: product-service-secret
  namespace: ecommerce
type: Opaque
stringData:
  DB_HOST: "REPLACE_ME"
  DB_USER: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
