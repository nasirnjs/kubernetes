# IMPORTANT: Do NOT commit real values. Create with literals:
#
#   kubectl -n ecommerce create secret generic payment-service-secret \
#     --from-literal=DB_HOST=<postgres-host> \
#     --from-literal=DB_USER=<db-user> \
#     --from-literal=DB_PASSWORD=<db-password> \
#     --from-literal=JWT_SECRET=<SAME secret as other services>
apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secret
  namespace: ecommerce
type: Opaque
stringData:
  DB_HOST: "REPLACE_ME"
  DB_USER: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME_SAME_AS_OTHER_SERVICES"
