apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ecommerce
data:
  PORT: "8080"
  DB_PORT: "5432"
  DB_NAME: "ecommerce"
  DB_SCHEMA: "order_svc"
  DB_SSLMODE: "disable"
  # In-cluster DNS to product-service in the same namespace.
  PRODUCT_SERVICE_URL: "http://product-service"
