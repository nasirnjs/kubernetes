# Rate-limit zone: 10 requests/min per source IP, 10 MB shared memory (≈160k IPs).
limit_req_zone $binary_remote_addr zone=kafdrop_login:10m rate=10r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # TLS — generate certs as documented in readme.md (Step 4)
    ssl_certificate     /etc/nginx/ssl/kafdrop.crt;
    ssl_certificate_key /etc/nginx/ssl/kafdrop.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "DENY"     always;
    add_header X-Content-Type-Options   "nosniff"  always;
    add_header Referrer-Policy          "no-referrer" always;
    add_header Content-Security-Policy  "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; font-src 'self' data:" always;

    # Trust X-Forwarded-* only from the loopback / docker bridge.
    # Uncomment and tune if you front this with another reverse proxy / cloud LB.
    #set_real_ip_from 10.0.0.0/8;
    #real_ip_header   X-Forwarded-For;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    location / {
        # Throttle brute-force attempts on basic auth.
        limit_req zone=kafdrop_login burst=20 nodelay;

        auth_basic           "Kafdrop — Authorized Personnel Only";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://kafdrop:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
