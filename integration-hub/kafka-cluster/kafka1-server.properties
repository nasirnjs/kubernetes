############################# KRaft and Node Identity #############################
process.roles=broker,controller
node.id=1
controller.quorum.voters=1@172.17.18.200:9093,2@172.17.18.201:9093,3@172.17.18.202:9093

############################# Listener Settings #############################
listeners=PLAINTEXT://172.17.18.200:9092,CONTROLLER://172.17.18.200:9093
advertised.listeners=PLAINTEXT://172.17.18.200:9092
inter.broker.listener.name=PLAINTEXT
controller.listener.names=CONTROLLER
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL

############################# Log Basics #############################
log.dirs=/kafka/data
num.partitions=6
num.recovery.threads.per.data.dir=1

############################# Replication and Reliability #############################
offsets.topic.replication.factor=3
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2           # ✅ aligns with min.insync.replicas; tolerates 1 broker failure
default.replication.factor=3              # ✅ recommended for new topics
min.insync.replicas=2                     # ✅ ensures fault tolerance (1 broker can go down)

############################# Log Retention Policy #############################
log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000

############################# Network and I/O #############################
num.network.threads=8
num.io.threads=16
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=209715200
message.max.bytes=209715200
max.message.bytes=209715200
replica.fetch.max.bytes=209715200

############################# General Broker Settings #############################
auto.create.topics.enable=false           # ✅ disable auto topic creation (for controlled ops)
delete.topic.enable=true                  # ✅ allows safe topic deletion
unclean.leader.election.enable=false      # ✅ ensures no data loss if a broker goes down
log.cleaner.enable=true                   # ✅ enable cleaner for compacted topics

############################# Replica / Leader Tuning #############################
num.replica.fetchers=4                    # parallel followers fetching from leader
replica.lag.time.max.ms=30000             # follower considered out-of-sync after 30s
auto.leader.rebalance.enable=true         # rebalance leadership to preferred replica
leader.imbalance.check.interval.seconds=300
group.initial.rebalance.delay.ms=3000     # avoid rebalance storm on cold consumer-group start
compression.type=producer                 # honor producer's compression codec end-to-end

############################# Rack Awareness #############################
# Set to the broker's physical rack / AZ / failure domain. Each broker should have a
# UNIQUE value reflecting its real fault domain so Kafka places replicas across racks.
# Examples: rack-1, az-a, dc1-r3.
# WARNING: Leave commented if all 3 brokers run on the same physical host or rack —
# rack-aware placement will then refuse to put replicas on the "same rack" and you
# will see permanent under-replicated partitions.
#broker.rack=rack-1

############################# Metadata Log (KRaft) #############################
# Optional: dedicate a separate disk for the KRaft metadata log to isolate fsync
# latency from data log writes. Create the dir + chown kafka:kafka before enabling.
#metadata.log.dir=/kafka/metadata

