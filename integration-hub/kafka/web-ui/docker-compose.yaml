services:
  kafdrop:
    # Pin to a specific tag — verify the latest stable at
    # https://hub.docker.com/r/obsidiandynamics/kafdrop/tags before bumping.
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: kafdrop
    restart: unless-stopped
    environment:
      KAFKA_BROKERCONNECT: "172.17.18.200:9092,172.17.18.201:9092,172.17.18.202:9092"
      JVM_OPTS: "-Xms256M -Xmx512M"
      SERVER_PORT: 9000
      # Disable destructive UI operations (topic delete / create from the UI).
      CMD_ARGS: "--topic.deleteEnabled=false --topic.createEnabled=false"
    mem_limit: 768m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - kafdrop-net

  kafdrop-nginx:
    image: nginx:1.27-alpine
    container_name: kafdrop-nginx
    restart: unless-stopped
    depends_on:
      kafdrop:
        condition: service_healthy
    ports:
      - "80:80"     # redirects to 443
      - "443:443"
    volumes:
      - ./nginx/kafdrop.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/kafdrop.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    mem_limit: 128m
    cpus: 0.25
    networks:
      - kafdrop-net

networks:
  # Private to this compose stack — other stacks cannot join.
  # Kafdrop is therefore reachable ONLY via the nginx reverse proxy (with basic auth + TLS).
  kafdrop-net:
    driver: bridge
